# @package _global_
#
# ACT baseline with goal-image conditioning.
#
# Variant of ``il_lib/configs/arch/act.yaml`` that:
#   1. Uses RGB only, since the goal image is a single PNG per demo with no
#      depth channel (avoids synthesising a fake depth channel).
#   2. Registers a goal-image view in the multi-view backbone. The goal view
#      name must match the key injected by
#      ``il_lib.datas.BehaviorIterableDatasetWithGoalImage``.
#   3. Leaves the transformer / CVAE head untouched so training / inference
#      code is unchanged.

arch_name: act_goal

# ====== Policy specific ======
num_latest_obs: 1
horizon: 20
deployed_action_steps: 1  # change to ${horizon} if temporal ensemble is off
wd: 0.1
bs: 128

# ------ module ------
module:
  _target_: il_lib.policies.ACT
  prop_dim: 37
  prop_keys:
    - odom/base_velocity
    - qpos/torso
    - qpos/left_arm
    - qpos/left_gripper
    - qpos/right_arm
    - qpos/right_gripper
    - eef/left_pos
    - eef/left_quat
    - eef/right_pos
    - eef/right_quat
  action_dim: 23
  action_keys: ${robot.action_keys}
  # RGB-only: goal image is a single PNG per demo with no depth channel,
  # so we run every view through a 3-channel ResNet18. ACT.process_data
  # routes every ``obs`` key containing "rgb" into the multi-view backbone.
  features: [proprioception, rgb]
  obs_backbone:
    _target_: il_lib.nn.features.MultiviewResNet18
    backbone: resnet18
    # Two views total, matching the GCBC goal-image pipeline:
    #   - head camera RGB (current observation)
    #   - goal image RGB (per-episode reference)
    # The wrist cameras from ``robot/r1pro.yaml`` are intentionally dropped.
    views:
      - robot_r1::robot_r1:zed_link:Camera:0
      - robot_r1::goal::Camera:0
    resnet_output_dim: 512
    use_shared_backbone: true
    load_pretrained: true
    include_depth: false
    enable_random_crop: true
    random_crop_size: 224
    return_last_spatial_map: true
  pos_encoding:
    position_embedding: sine
    hidden_dim: ${module.hidden_dim}
  num_queries: ${horizon}
  hidden_dim: 512
  dropout: 0.1
  n_heads: 8
  dim_feedforward: 3200
  num_encoder_layers: 4
  num_decoder_layers: 7
  pre_norm: false
  kl_weight: 10
  temporal_ensemble: true

data:
  use_action_chunks: false
  # RGB-only to match the goal-image pipeline.
  visual_obs_types: [rgb]
  use_task_info: false
